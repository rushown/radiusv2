[profile.default]
src         = "src"
out         = "out"
libs        = ["lib"]
test        = "test"
script      = "script"
optimizer   = true
optimizer_runs = 200
solc_version = "0.8.24"
evm_version  = "paris"          # Arc EVM compatibility

# Gas reporting
gas_reports  = ["LinkPay"]

# Fuzz configuration
[fuzz]
runs    = 2048
seed    = "0xdeadbeef"
max_test_rejects = 65536

# Fork testing (set ARC_RPC_URL env var to enable)
# [rpc_endpoints]
# arc_testnet = "${ARC_RPC_URL}"

[fmt]
line_length = 100
tab_width   = 4
bracket_spacing = true

[profile.ci]
fuzz.runs = 10000
