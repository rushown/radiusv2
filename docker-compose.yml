version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_PATH=/data/radiuspay.db
      - ARC_RPC_URL=https://rpc.testnet.arc.network
      - ARC_CHAIN_ID=5042002
      - USDC_CONTRACT_ADDRESS=0x3600000000000000000000000000000000000000
      - LINKPAY_CONTRACT_ADDRESS=${LINKPAY_CONTRACT_ADDRESS}
      - CORS_ORIGINS=${FRONTEND_URL:-http://localhost:5173}
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX_REQUESTS=60
      - VERIFY_RATE_LIMIT_WINDOW_MS=60000
      - VERIFY_RATE_LIMIT_MAX_REQUESTS=10
      - LOG_LEVEL=info
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
    volumes:
      - backend_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:4000
        - VITE_LINKPAY_CONTRACT_ADDRESS=${LINKPAY_CONTRACT_ADDRESS}
        - VITE_USDC_CONTRACT_ADDRESS=0x3600000000000000000000000000000000000000
        - VITE_ARC_CHAIN_ID=5042002
        - VITE_ARC_RPC_URL=https://rpc.testnet.arc.network
        - VITE_BLOCK_EXPLORER_URL=https://testnet.arcscan.app
        - VITE_APP_URL=${FRONTEND_URL:-http://localhost:5173}
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
